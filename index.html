  { id: "CM5.2", code: "CM5.2", title: "Kiosk Is Clean & In Good Repair. Interior Menuboard Clean And In Good Repair With Correct Pricing", points: 3, category: "brand", subcategory: "Technology Check", allowNA: true, checks: ["In good working condition; no Out of Order paper signs", "Free of debris, dust, build-up", "Not visibly soiled, damaged, in poor condition, or malfunctioning", "No burnt out bulbs; numbers not missing or incorrect", "Digital Menu boards: no missing or burnt out pixels; screen is not black"] },

  { id: "CM1.1", code: "CM1.1", title: "Parking Lot, Drive-Thru Lane, Dumpster Pad & Sidewalks, Are Clean, Free Of Build-Up, And In Good Condition", points: 3, category: "brand", subcategory: "Outside Your Taco Bell (C&M)", allowNA: true, checks: ["Parking Lot free of spills, debris, litter, cigarette butts; in good condition", "No gum build-up (black gum)", "Exterior tables & chairs clean; in good condition", "Sidewalk clean; in good condition; no grease/'trash trail' on sidewalk at rear door", "Parking stops not crumbling; no rebar exposed", "Sidewalks free of snow & ice", "Note: Exterior deduction = 4+ minor issues in one area OR 1 major issue"] },

  { id: "CM1.6", code: "CM1.6", title: "Drive-Thru Window Is Clean & In Good Repair", points: 3, category: "brand", subcategory: "Outside Your Taco Bell (C&M)", allowNA: true, checks: ["Not visibly soiled, damaged, or in poor condition", "No visible fingerprints or tape residue", "Window not propped open or consistently left open between transactions", "No visible clutter"] },

  { id: "CM3.1", code: "CM3.1", title: "Restroom Walls, Floors, Fixtures Are Clean, Stocked And In Good Repair", points: 5, category: "brand", subcategory: "Inside Your Taco Bell (C&M)", allowNA: true, checks: ["Not soiled, not stocked issues, in good condition and functioning", "Restroom free of foul odors", "Bathroom fixtures (toilet, urinal, sink) functioning and mounted correctly; turn on/off and don't leak", "Soap, toilet paper, paper towel dispensers, hand dryer, air freshener working, clean and stocked", "Sinks, faucet, mirrors working properly, clean and stocked", "Stall doors, walls, baby changing station and trash cans working properly, clean and stocked"] },
  { id: "CM4.1", code: "CM4.1", title: "Dining Room Furniture, Trash Receptacles, Walls, Ceilings And Floors Clean And In Good Repair", points: 5, category: "brand", subcategory: "Inside Your Taco Bell (C&M)", allowNA: true, checks: ["Floor mats present at all entrances and in front of drink machine", "Floors, Baseboards, Mats, Walls & Partitions clean", "All lights working; no mismatched lighting", "Paintings or signs clean and look good; Ceiling tiles clean without stains", "No scratches or marks on tables or chairs easily viewed by customers", "Graffiti removed or painted over; tears in cushion seating repaired", "Music volume allows for comfortable conversation; temperature is reasonable", "Chairs, Cabinets, Trash Receptacles, Booster Seats, High Chairs, Tables: not soiled, damaged, or in poor condition"] },

const WATCHOUTS = [

  { id: "WO2", title: "Parking A Car During A Visit", points: 10, checks: ["A customer car is parked due to ingredients or order not being ready at window"] },
  { id: "WO3", title: "Brand Protection", points: 10, checks: ["Major disruption, shouting/cursing, customer being questioned/argued with", "Restaurant is not serving a Taco Bell approved menu item"] },
  { id: "WO4", title: "Box Meals Received In Designated Box", points: 10, checks: ["Box meals not delivered in correct box"] },
  { id: "WO5", title: "Voice Of Customer (VOC) Integrity", points: 10, checks: ["VOC gaming of any kind occurs (anything additional beyond requesting feedback e.g. 'this for that')"] },
];

function getSpeedScore(minutes, seconds) {
  var totalSeconds = (minutes * 60) + Number(seconds);
  if (totalSeconds <= 240) return 5;
  if (totalSeconds <= 255) return 4;
  if (totalSeconds <= 300) return 2;
  return 0;
}

function calculateScores(responses) {
  var results = { categories: {}, overall: { earned: 0, possible: 0, percentage: 0 }, watchoutDeductions: 0 };
  CATEGORIES.forEach(function(cat) { results.categories[cat.id] = { earned: 0, possible: 0, items: [] }; });
  LINE_ITEMS.forEach(function(item) {
    var response = responses[item.id];
    if (!response || response.status === "na") return;
    var catResult = results.categories[item.category];
    catResult.possible += item.points;
    results.overall.possible += item.points;
    var earned = 0;
    if (response.status === "pass") earned = item.points;
    else if (item.tiered && response.status === "tiered") earned = response.tieredScore || 0;
    catResult.earned += earned;
    results.overall.earned += earned;
    catResult.items.push(Object.assign({}, item, { earned: earned, status: response.status, notes: response.notes }));
  });
  WATCHOUTS.forEach(function(wo) {
    if (responses[wo.id] && responses[wo.id].status === "fail") results.watchoutDeductions += wo.points;
  });
  results.overall.earned = Math.max(0, results.overall.earned - results.watchoutDeductions);
  results.overall.percentage = results.overall.possible > 0 ? Math.round((results.overall.earned / results.overall.possible) * 100) : 0;
  return results;
}

function Svg(p) {
  return React.createElement("svg", { className: p.className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, p.children);
}

  ListChecks: function(c) { return <Svg className={c.className}><path d="M3 17l2 2 4-4"/><path d="M3 7l2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></Svg>; },

function ScoreBanner(props) {
  var earned = props.earned, possible = props.possible, wd = props.watchoutDeductions || 0;
  var pct = possible > 0 ? Math.round((earned / possible) * 100) : 0;
  var color = pct >= 80 ? "#10b981" : pct >= 60 ? "#f59e0b" : "#ef4444";
  var C = 2 * Math.PI * 28;
  var off = C - (pct / 100) * C;
  var lost = possible - earned;
  return (
    <div className="bg-zinc-900 rounded-2xl p-4 flex items-center gap-4">
      <div className="relative w-16 h-16 flex-shrink-0">
        <svg className="w-16 h-16 -rotate-90" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="28" fill="none" stroke="#27272a" strokeWidth="4" />
          <circle cx="32" cy="32" r="28" fill="none" stroke={color} strokeWidth="4" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset={off}
            style={{ transition: "stroke-dashoffset 0.6s ease-out, stroke 0.3s ease" }} />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <span className="text-lg font-bold" style={{ color: color }}>{pct}%</span>
        </div>
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-white font-semibold text-sm">CORE Score</div>
        <div className="text-zinc-400 text-xs mt-0.5">{earned} / {possible} pts{lost > 0 ? " (-" + lost + ")" : ""}</div>
        {wd > 0 && <div className="text-red-400 text-xs mt-0.5">Watch-out: -{wd} pts</div>}
        {lost > 20 && <div className="text-red-400 text-xs font-semibold mt-0.5">Over 20-pt limit!</div>}
      </div>
    </div>
  );
}

function CategoryProgress(props) {
  var responses = props.responses;
  return (
    <div className="grid grid-cols-2 gap-2">
      {CATEGORIES.map(function(cat) {
        var items = LINE_ITEMS.filter(function(i) { return i.category === cat.id; });
        var answered = items.filter(function(i) { return responses[i.id] && responses[i.id].status; }).length;
        var total = items.length;
        var earned = 0, possible = 0;
        items.forEach(function(item) {
          var r = responses[item.id];
          if (!r || r.status === "na") return;
          possible += item.points;
          if (r.status === "pass") earned += item.points;
          else if (r.status === "tiered") earned += r.tieredScore || 0;
        });
        var pct = possible > 0 ? Math.round((earned / possible) * 100) : null;
        return (
          <div key={cat.id} className="bg-white border border-zinc-200 rounded-xl p-3">
            <div className="flex items-center gap-2 mb-1.5">
              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }} />
              <span className="text-xs font-semibold text-zinc-700 truncate">{cat.name}</span>
            </div>
            <div className="flex items-end justify-between">
              <div>
                <span className="text-lg font-bold text-zinc-900">{pct !== null ? pct + "%" : "—"}</span>
                <span className="text-xs text-zinc-400 ml-1">{earned}/{possible}</span>
              </div>

                <h4 className="text-xs font-bold text-zinc-400 mt-2">Not Applicable</h4>
                {naItems.map(function(item) {
                  return <div key={item.id} className="bg-zinc-50 border border-zinc-200 rounded-lg px-3 py-2 flex items-center gap-2"><I.Minus className="w-4 h-4 text-zinc-300" /><span className="text-[10px] font-mono text-zinc-400">{item.code}</span><span className="text-xs text-zinc-500 truncate">{item.title}</span></div>;
                })}
              </div>
            );
          })()}
          {(function() {
            var triggered = WATCHOUTS.filter(function(w) { return responses[w.id] && responses[w.id].status === "fail"; });
            if (triggered.length === 0) return null;
            return (
              <div className="space-y-1">
                <h4 className="text-xs font-bold text-red-500 mt-2">Watch-Outs Triggered</h4>
                {triggered.map(function(w) { return <div key={w.id} className="bg-red-50 border border-red-200 rounded-lg px-3 py-2 flex items-center gap-2"><I.Alert className="w-4 h-4 text-red-500" /><span className="text-xs text-red-700 font-medium">{w.title}</span><span className="text-xs text-red-500 ml-auto">-{w.points} pts</span></div>; })}
              </div>
            );
          })()}
          {(function() {
            var unanswered = LINE_ITEMS.filter(function(i) { return !responses[i.id] || !responses[i.id].status; });
            if (unanswered.length === 0) return null;
            return <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><p className="text-sm font-semibold text-amber-800">{unanswered.length} items not yet evaluated</p><p className="text-xs text-amber-600 mt-1">Return to the evaluation to complete all line items.</p></div>;
          })()}
        </div>
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 px-4 py-3 safe-area-bottom space-y-2">
        <div className="flex gap-2">
          <button onClick={exportPNG} disabled={!!exporting[0]} className="flex-1 h-11 border border-zinc-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-zinc-700 disabled:opacity-50">
            {exporting[0] === "png" ? <div className="w-4 h-4 border-2 border-zinc-300 border-t-zinc-700 rounded-full animate-spin" /> : <I.File className="w-4 h-4" />}
            {exporting[0] === "png" ? "Exporting..." : "Export PNG"}
          </button>
          <button onClick={exportPDF} disabled={!!exporting[0]} className="flex-1 h-11 border border-zinc-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-zinc-700 disabled:opacity-50">
            {exporting[0] === "pdf" ? <div className="w-4 h-4 border-2 border-zinc-300 border-t-zinc-700 rounded-full animate-spin" /> : <I.File className="w-4 h-4" />}
            {exporting[0] === "pdf" ? "Exporting..." : "Export PDF (A4)"}
          </button>
        </div>
        <div className="flex gap-2">
          <button onClick={function() { props.go("evaluate"); }} className="flex-1 h-11 border border-zinc-200 rounded-xl flex items-center justify-center text-sm font-medium text-zinc-600">&larr; Back to Evaluation</button>
          <button onClick={handleShare} disabled={!!exporting[0]} className="flex-1 h-11 bg-purple-600 text-white rounded-xl flex items-center justify-center gap-2 text-sm font-semibold disabled:opacity-50">{exporting[0] === "share" ? <div className="w-4 h-4 border-2 border-purple-200 border-t-white rounded-full animate-spin" /> : <I.Share className="w-4 h-4" />} {exporting[0] === "share" ? "Generating..." : "Share Report"}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  var page = useState("home");
  var go = function(p) { page[1](p); window.scrollTo(0, 0); };
  if (page[0] === "home") return <HomePage go={go} />;
  if (page[0] === "evaluate") return <EvaluatePage go={go} />;
  if (page[0] === "report") return <ReportPage go={go} />;
  return <HomePage go={go} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
